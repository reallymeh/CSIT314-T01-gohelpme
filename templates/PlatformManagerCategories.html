<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRA Categories — Online Fundraising System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

    <div class="topbar">
        <span class="topbar-logo">Online Fundraising System — Platform Manager Portal</span>
        <div class="topbar-user">
            <span id="manager-name">Platform Manager</span>
            <div class="avatar">PM</div>
        </div>
    </div>

    <div class="layout">

        <div class="sidebar">
            <a href="/manager/categories" class="nav-item active">FRA Categories</a>
            <a href="/logout" class="nav-item logout">Log Out</a>
        </div>

        <div class="main">
            <div class="page-title">FRA Categories</div>
            <div class="page-sub">View and manage all fundraising activity categories</div>

            <div class="toolbar">
                <form id="search-form" style="display:flex; gap:10px; align-items:center;">
                    <input
                        class="search-box"
                        type="text"
                        id="search-input"
                        placeholder="Search category..."
                    />
                    <button type="submit" class="btn-primary">Search</button>
                </form>
                <a href="/manager/create_category" class="btn-primary">+ Create Category</a>
            </div>

            <!-- Grid will be populated by JavaScript -->
            <div class="grid" id="category-grid">
                <p class="loading">Loading categories...</p>
            </div>

        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const categoryGrid = document.getElementById('category-grid');

        async function loadCategories(query = '') {
        try {
            const response = await fetch(`/manager/search_categories?q=${encodeURIComponent(query)}`);
            const categories = await response.json();

            if (categories.length === 0) {
                categoryGrid.innerHTML = `<p class="no-results">No categories found for "${query}".</p>`;
                return;
            }

            let html = '';
            categories.forEach(category => {
                const catName = category.category_name; 
                const lowerName = catName.toLowerCase();

                html += `
                    <div class="profile-card">
                        <div class="card-top">
                            <div class="icon-circle ${lowerName === 'cash' ? 'icon-donee' : 'icon-fr'}">
                                ${catName.substring(0, 2).toUpperCase()}
                            </div>
                            <div>
                                <div class="card-name">${catName}</div>
                                <div class="card-desc">${category.description || ''}</div>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="act-btn view" 
                                    onclick="window.location.href='/manager/viewcategory/${encodeURIComponent(catName)}'">
                                View
                            </button>
                            <button class="act-btn" 
                                    onclick="window.location.href='/manager/updatecategory/${encodeURIComponent(catName)}'">
                                Update
                            </button>
                            <button class="act-btn danger" 
                                    onclick="suspendCategory('${catName}')">
                                Suspend
                            </button>
                        </div>
                    </div>
                `;
            });

            categoryGrid.innerHTML = html;
        } catch (error) {
            categoryGrid.innerHTML = `<p class="error">Error loading categories. Please try again.</p>`;
            console.error(error);
            }
        }

        document.getElementById('search-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const query = searchInput.value.trim();
        loadCategories(query);
        });





        // =====================
        // BCE BOUNDARY: SuspendFRACategory
        // HARDCODED — backend needs to:
        // uncomment fetch block, delete hardcoded alert line
        // Flask route: POST /manager/suspend_category → SuspendFRACategoryController
        // =====================
        function suspendCategory(categoryName) {
            if (confirm("Are you sure you want to suspend " + categoryName + "?")) {
                // BACKEND: Hook to POST /manager/suspend_category → SuspendFRACategory boundary
                // fetch('/manager/suspend_category', {
                //     method: 'POST',
                //     headers: { 'Content-Type': 'application/json' },
                //     body: JSON.stringify({ category_name: categoryName })
                // })
                // .then(response => response.json())
                // .then(data => {
                //     // displaySuspendSuccess() or displaySuspendFail()
                //     alert(data.message);
                //     location.reload();
                // });
                alert("Suspend " + categoryName + " coming soon!");
            }
        }

        // BCE BOUNDARY: Call displayFRACategory() on page load
        window.onload = function() {
            loadCategories('');
        };
    </script>

</body>
</html>
