<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundraiser Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
{% if message %}
<div id="alert-box">{{ message }}</div>
{% endif %}

<!-- TOP BAR -->
<div class="topbar">
    <span class="topbar-logo">Online Fundraising System — Fund Raiser Portal</span>

    <div class="topbar-user">
        <span>Fund Raiser</span>
        <div class="avatar">FR</div>
    </div>
</div>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="/fundraiser/homepage" class="nav-item active">Dashboard</a>
        <a href="/fundraiser/history" class="nav-item">History</a>
        <a href="/user/logout" class="nav-item logout">Log Out</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="page-title">My Fundraising Activities</div>
        <div class="page-sub">All your FRA campaigns</div>

        <!-- TOOLBAR -->
        <div class="toolbar" style="display:flex; justify-content:space-between; align-items:center;">

            <!-- SEARCH -->
            <div class="search-group">
                <input type="text" id="searchInput" placeholder="Search FRA title...">
                <button onclick="searchFRA()" class="btn-primary">Search</button>
            </div>

            <!-- CREATE BUTTON -->
            <a href="/fundraiser/create" class="btn-primary">
                + Create FRA
            </a>

        </div>

        <!-- GRID -->
        <div class="grid" id="fra-container">

            {% for fra in fra_data %}

            <div class="profile-card">

                <!-- TOP -->
                <div class="card-top">
                    <div class="icon-circle icon-fr">
                        {{ fra.title[:2] | upper }}
                    </div>

                    <div>
                        <div class="card-name">{{ fra.title }}</div>

                        <!-- GREY DESCRIPTION -->
                        <div style="font-size:12px; color:grey; margin-top:2px;">
                            {{ fra.description }}
                        </div>
                    </div>
                </div>

                <!-- ACTIONS -->
                <div class="card-actions">

                    <button class="act-btn view" onclick="window.location.href='/fundraiser/view/{{ fra.fraId }}'">
                    View
                    </button>
                    <button class="act-btn" onclick="window.location.href='/fundraiser/update/{{ fra.fraId }}'">
                    Update
                    </button>

                    <button class="act-btn" onclick="suspendFRA('{{ fra.fraId }}')"
                            style="color:red; border:1px solid red;">
                        Suspend
                    </button>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>
</div>

</body>
</html>

<script>
function suspendFRA(fraId) {
    fetch(`/fundraiser/suspend/${fraId}`, {
        method: 'POST'
    })
    .then(res => res.json())
    .then(data => {

        alert(data.message);

        if (data.success) {
            location.reload();
        }
    })
    .catch(err => {
        console.error(err);
        alert("Suspend failed");
    });
}
setTimeout(function() {
    const alertBox = document.getElementById("alert-box");
    if (alertBox) {
        alertBox.style.display = "none";
    }
}, 3000);

function searchFRA() {
    const name = document.getElementById('searchInput').value;

    fetch('/fundraiser/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
    })
    .then(res => res.json())
    .then(data => {

        const container = document.querySelector('.grid');
        container.innerHTML = "";

        if (data.data.length === 0) {
            container.innerHTML = "<p>No FRA found</p>";
            return;
        }

        data.data.forEach(fra => {
            container.innerHTML += `
            <div class="profile-card">

                <div class="card-top">
                    <div class="icon-circle icon-fr">
                        ${fra.title.substring(0,2).toUpperCase()}
                    </div>

                    <div>
                        <div class="card-name">${fra.title}</div>

                        <div style="font-size:12px; color:grey; margin-top:2px;">
                            ${fra.description}
                        </div>
                    </div>
                </div>

                <div class="card-actions">

                    <button class="act-btn view"
                        onclick="window.location.href='/fundraiser/view/${fra.fraId}'">
                        View
                    </button>

                    <button class="act-btn"
                        onclick="window.location.href='/fundraiser/update/${fra.fraId}'">
                        Update
                    </button>

                    <button class="act-btn"
                        onclick="suspendFRA('${fra.fraId}')"
                        style="color:red; border:1px solid red;">
                        Suspend
                    </button>

                </div>

            </div>
            `;
        });
    })
    .catch(err => {
        console.error(err);
        alert("Search failed");
    });
}
</script>
