<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update User Account — Admin Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  
    <div class="topbar">
        <span class="topbar-logo">Online Fundraising System — Admin Portal</span>
        <div class="topbar-user">
            <span id="admin-name">User Admin</span>
            <div class="avatar">UA</div>
        </div>
    </div>

    <div class="layout">

        <div class="sidebar">
            <a href="/admin/userprofile" class="nav-item">User Profiles</a>
            <a href="/admin/useraccounts" class="nav-item active">User Accounts</a>
            <a href="#" class="nav-item logout">Log Out</a>
        </div>

        <div class="main">
            <div class="page-title">Update User Account</div>
            <div class="page-sub">Modify account details and status for ID: <strong>{{ user_id }}</strong></div>

            <div class="profile-card update-form-wrapper" style="max-width: 600px;">
                <div class="card-top">
                    <div class="card-name">Account Information</div>
                </div>
                
                <div class="card-body">
                    <input type="hidden" id="userId" value="{{ user_id }}">

                    <div class="form-group">
                        <label class="form-label" for="name">Full Name *</label>
                        <input type="text" id="name" class="search-box form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Number</label>
                        <input type="text" id="phone" class="search-box form-input">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="address">Address</label>
                        <textarea id="address" class="search-box form-input" rows="2" style="resize: vertical; font-family: inherit;"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="accountStatus">Account Status</label>
                        <select id="accountStatus" class="search-box form-input">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="userType">User Type (Role)</label>
                        <select id="userType" class="search-box form-input">
                            <option value="admin">User Admin</option>
                            <option value="fund_raiser">Fund Raiser (FR)</option>
                            <option value="donee">Donee</option>
                            <option value="platform_management">Platform Management</option>
                        </select>
                    </div>

                    <div class="form-group-large">
                        <label class="form-label" for="bio">Bio / Description</label>
                        <textarea id="bio" class="search-box form-input" rows="3" style="resize: vertical; font-family: inherit;"></textarea>
                    </div>

                    <div class="form-actions">
                        <button class="btn-primary" onclick="submitAccountUpdate()">Save Updates</button>
                        <button class="act-btn" onclick="window.location.href='/admin/useraccounts'">Cancel</button>
                    </div>
                    
                    <div id="message" class="message-box"></div>
                </div>
            </div>

        </div>
        </div>
    <script>
        async function fetchUserData() {
            const userId = document.getElementById('userId').value;
            try {
                const response = await fetch(`/api/users/${userId}`);
                if (response.ok) {
                    const result = await response.json();
                    const user = result.data;
                    
                    document.getElementById('name').value = user.name || '';
                    document.getElementById('phone').value = user.phone || '';
                    document.getElementById('address').value = user.address || '';
                    document.getElementById('accountStatus').value = user.accountStatus || 'active';
                    document.getElementById('userType').value = user.userType || 'fund_raiser';
                    document.getElementById('bio').value = user.bio || '';
                }
            } catch (error) {
                console.error("Could not fetch initial user data:", error);
            }
        }

        window.onload = fetchUserData;

        async function submitAccountUpdate() {
            const userId = document.getElementById('userId').value;
            const messageBox = document.getElementById('message');

            const updatedData = {
                name: document.getElementById('name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                address: document.getElementById('address').value.trim(),
                accountStatus: document.getElementById('accountStatus').value,
                userType: document.getElementById('userType').value,
                bio: document.getElementById('bio').value.trim()
            };

            if (!updatedData.name) {
                messageBox.style.color = "#A32D2D";
                messageBox.innerText = "Error: Name is required.";
                return;
            }
            
            try {
                const response = await fetch(`/api/users/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updatedData)
                });
                
                const result = await response.json();
                
                if (response.ok || result.success) {
                    messageBox.style.color = "#3B6D11";
                    messageBox.innerText = "Success: Account updated successfully.";
                    
                    setTimeout(() => {
                        window.location.href = '/admin/useraccounts';
                    }, 2000);
                } else {
                    messageBox.style.color = "#A32D2D";
                    messageBox.innerText = "Error: " + (result.message || result.error || "Failed to update.");
                }
            } catch (error) {
                console.error("Error updating user:", error);
                messageBox.style.color = "#A32D2D";
                messageBox.innerText = "Failed to connect to the backend server.";
            }
        }
    </script>
</body>
</html>
