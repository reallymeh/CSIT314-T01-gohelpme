<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create FRA — Fundraiser Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>

<div class="topbar">
    <span class="topbar-logo">Online Fundraising System — Fund Raiser Portal</span>
    <div class="topbar-user">
        <span id="fundraiser-name">Fund Raiser</span>
        <div class="avatar">FR</div>
    </div>
</div>

<div class="layout">

    <div class="sidebar">
        <a href="/fundraiser/homepage" class="nav-item">Dashboard</a>
        <a href="/fundraiser/logout" class="nav-item logout">Log Out</a>
    </div>

    <div class="main">

        <div class="page-title">Update Fundraising Activity</div>
        <div class="page-sub">Fill in the details below to update your FRA:</div>

        <div class="profile-card update-form-wrapper">

            <form onsubmit="updateFRA(event)">

                <input type="hidden" id="fraId" value="{{ fra.fraId }}">

                <div class="input-group">
                    <label>Title</label>
                    <input type="text" id="title" value="{{ fra.title }}">
                </div>

                <div class="input-group">
                    <label>Description</label>
                    <textarea id="description">{{ fra.description }}</textarea>
                </div>

                <div class="input-group">
                    <label>Category</label>
                    <input type="text" id="category" value="{{ fra.category }}">
                </div>

                <div class="input-group">
                    <label>Target Amount</label>
                    <input type="number" id="target_amount" value="{{ fra.target_amount }}">
                </div>

                <div class="input-group">
                    <label>Start Date</label>
                    <input type="date" id="start_date" value="{{ fra.start_date }}">
                </div>

                <div class="input-group">
                    <label>End Date</label>
                    <input type="date" id="end_date" value="{{ fra.end_date }}">
                </div>

                <div class="input-group">
                    <label>Location</label>
                    <input type="text" id="location" value="{{ fra.location }}">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Update</button>

                    <button type="button" class="btn-primary"
                        onclick="window.location.href='/fundraiser/homepage'">
                        Cancel
                    </button>
                </div>

                <div id="message"></div>

            </form>
        </div>
    </div>

</div>

<script>
function updateFRA(event) {
    
    event.preventDefault(); 
    console.log("fraId =", document.getElementById('fraId').value);

    const payload = {
        fraId: document.getElementById('fraId').value.trim(),
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        category: document.getElementById('category').value,
        target_amount: document.getElementById('target_amount').value,
        start_date: document.getElementById('start_date').value,
        end_date: document.getElementById('end_date').value,
        location: document.getElementById('location').value
    };

    fetch('/fundraiser/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);

        if (data.success) {
            window.location.href = '/fundraiser/homepage';
        }
    })
    .catch(err => {
        console.error(err);
        alert("Update failed");
    });
}
</script>
